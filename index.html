<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مستعرض ومصدر العوالم ثلاثية الأبعاد | المطور</title>
    
    <!-- مكتبات العرض والمعالجة والضغط -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        :root {
            --bg-color: #121214;
            --panel-bg: #1e1e24;
            --accent-color: #4f46e5;
            --accent-hover: #4338ca;
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            display: flex;
            height: 100vh;
        }

        #sidebar {
            width: 320px;
            background-color: var(--panel-bg);
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
            overflow-y: auto;
        }

        h2 {
            margin-top: 0;
            font-size: 1.3rem;
            border-bottom: 2px solid #2d2d35;
            padding-bottom: 10px;
            color: #fff;
        }

        .btn {
            border: 2px dashed #4b5563;
            color: #fff;
            background-color: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            text-align: center;
            display: block;
        }

        .btn:hover {
            border-color: var(--accent-color);
            background-color: rgba(79, 70, 229, 0.1);
        }

        .info-panel {
            background-color: #16161a;
            border-radius: 6px;
            padding: 15px;
            font-size: 0.9rem;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
        }

        .info-label {
            color: var(--text-muted);
        }

        .info-value {
            font-weight: bold;
            color: #fff;
        }

        #error-log {
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #fc8181;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            white-space: pre-wrap;
            display: none;
        }

        #export-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            display: none;
        }

        #export-btn:hover {
            background-color: var(--accent-hover);
        }

        #canvas-container {
            flex-grow: 1;
            position: relative;
            height: 100%;
        }

        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2rem;
            background: rgba(0,0,0,0.8);
            padding: 15px 30px;
            border-radius: 30px;
            display: none;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>مستعرض عوالم Dat 3D</h2>
        
        <!-- تم تبسيط حقل الرفع لضمان عمل الضغط في كل المتصفحات -->
        <label for="file-input" class="btn">اضغط هنا واختر ملف world3d.dat</label>
        <input type="file" id="file-input" accept=".dat" style="display: none;" />

        <div id="error-log"></div>

        <div class="info-panel">
            <div class="info-item">
                <span class="info-label">حالة الملف:</span>
                <span class="info-value" id="status-val" style="color: #ef4444;">لم يتم رفع ملف</span>
            </div>
            <div class="info-item">
                <span class="info-label">حجم الملف الحقيقي:</span>
                <span class="info-value" id="size-val">-</span>
            </div>
            <div class="info-item">
                <span class="info-label">موقع اللاعب X:</span>
                <span class="info-value" id="px-val">-</span>
            </div>
            <div class="info-item">
                <span class="info-label">موقع اللاعب Y:</span>
                <span class="info-value" id="py-val">-</span>
            </div>
            <div class="info-item">
                <span class="info-label">موقع اللاعب Z:</span>
                <span class="info-value" id="pz-val">-</span>
            </div>
            <div class="info-item">
                <span class="info-label">عدد البلوكات:</span>
                <span class="info-value" id="blocks-val">-</span>
            </div>
        </div>

        <button id="export-btn">تحميل كملف مضغوط ZIP (OBJ)</button>
    </div>

    <div id="canvas-container">
        <div class="loader" id="main-loader">جاري معالجة وتوليد المشهد ثلاثي الأبعاد...</div>
    </div>

    <!-- الجزء الأول: سكريبت مستقل ومحصن لالتقاط الملف فوراً وعرض الأخطاء -->
    <script>
        const errorLog = document.getElementById('error-log');
        const statusVal = document.getElementById('status-val');

        function showDebugError(msg, err) {
            errorLog.style.display = 'block';
            errorLog.innerText = `[خطأ]: ${msg}\n${err ? err.stack || err.message : ''}`;
            statusVal.innerText = "فشل القراءة";
            statusVal.style.color = "#ef4444";
        }

        // الاستماع المباشر لحدث تغيير الملف
        document.getElementById('file-input').addEventListener('change', function(evt) {
            errorLog.style.display = 'none';
            const file = evt.target.files[0];
            if (!file) return;

            document.getElementById('size-val').innerText = file.size + " بايت";
            statusVal.innerText = "جاري قراءة الملف ثنائياً...";
            statusVal.style.color = "#eab308";
            document.getElementById('main-loader').style.display = 'block';

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const buffer = e.target.result;
                    const view = new DataView(buffer);
                    
                    if (buffer.byteLength < 16) {
                        throw new Error(`حجم الملف صغير جداً (${buffer.byteLength} بايت). الملف تالف أو لا يحتوي على الهيكل الأساسي للعبة.`);
                    }

                    let offset = 0;
                    // قراءة الترويسة الأساسية (Header)[cite: 3]
                    const playerX = view.getFloat32(offset, true); offset += 4;
                    const playerY = view.getFloat32(offset, true); offset += 4;
                    const playerZ = view.getFloat32(offset, true); offset += 4;
                    const numModifiedBlocks = view.getInt32(offset, true); offset += 4;

                    // تحديث بيانات الواجهة فوراً
                    statusVal.innerText = "تمت قراءة البيانات الأساسية";
                    statusVal.style.color = "#10b981";
                    document.getElementById('px-val').innerText = playerX.toFixed(2);
                    document.getElementById('py-val').innerText = playerY.toFixed(2);
                    document.getElementById('pz-val').innerText = playerZ.toFixed(2);
                    document.getElementById('blocks-val').innerText = numModifiedBlocks;

                    // التحقق من حجم البلوكات المتبقية لتفادي تجميد المتصفح
                    const expectedRemainingBytes = numModifiedBlocks * 16;
                    if (offset + expectedRemainingBytes > buffer.byteLength) {
                        console.warn("تحذير: مؤشر الملف أشار لعدد بلوكات أكبر من الحجم الفعلي للملف. سيتم قراءة المتاح فقط.");
                    }

                    const blocks = [];
                    // قراءة كتل البلوكات (كل بلوك 16 بايت: x, y, z, type)[cite: 3]
                    for (let i = 0; i < numModifiedBlocks; i++) {
                        if (offset + 16 > buffer.byteLength) break;
                        const bx = view.getInt32(offset, true); offset += 4;
                        const by = view.getInt32(offset, true); offset += 4;
                        const bz = view.getInt32(offset, true); offset += 4;
                        const btype = view.getInt32(offset, true); offset += 4; //[cite: 3]
                        
                        blocks.push({ x: bx, y: by, z: bz, type: btype });
                    }

                    // إرسال البيانات للمحرك ثلاثي الأبعاد
                    if (typeof renderWorldScene === 'function') {
                        renderWorldScene(blocks);
                    } else {
                        throw new Error("محرك Three.js لم يكتمل تحميله بشكل صحيح في المتصفح الخاص بك.");
                    }

                } catch (err) {
                    showDebugError("حدث خطأ أثناء فك التشفير الثنائي للملف. تأكد أن الملف تم إنشاؤه من دالة save_world بنجاح.", err);
                } finally {
                    document.getElementById('main-loader').style.display = 'none';
                }
            };

            reader.onerror = function(err) {
                showDebugError("فشل نظام التشغيل في قراءة بايتات الملف البدائية.", err);
            };
            
            reader.readAsArrayBuffer(file);
        });
    </script>

    <!-- الجزء الثاني: إعداد وتفعيل محرك Three.js والمواد الرسومية -->
    <script>
        let scene, camera, renderer, controls, currentMesh = null, globalGeometryData = null;
        let atlasCanvas;

        // توليد الأطلس التلقائي للأنسجة برمجياً
        function initTextureAtlas() {
            atlasCanvas = document.createElement('canvas');
            atlasCanvas.width = 256; atlasCanvas.height = 256;
            const ctx = atlasCanvas.getContext('2d');
            
            function drawNoiseBlock(x, y, color) {
                ctx.fillStyle = color; ctx.fillRect(x, y, 64, 64);
                for(let i=0; i<64; i+=4) {
                    for(let j=0; j<64; j+=4) {
                        if(Math.random() > 0.4) {
                            ctx.fillStyle = `rgba(0,0,0,${Math.random() * 0.15})`;
                            ctx.fillRect(x+i, y+j, 4, 4);
                        }
                    }
                }
            }
            // رسم الخامات الستة الافتراضية للعبة[cite: 3]
            drawNoiseBlock(0, 0, '#557a2b');   // 1: Grass Top[cite: 3]
            drawNoiseBlock(64, 0, '#737373');  // 2: Stone[cite: 3]
            drawNoiseBlock(128, 0, '#a07649'); // 3: Wood[cite: 3]
            drawNoiseBlock(192, 0, '#866043'); // 4: Dirt[cite: 3]
            drawNoiseBlock(0, 64, '#b84c3c');  // 5: Bricks[cite: 3]
            
            // 6: DirtGrass Side[cite: 3]
            drawNoiseBlock(64, 64, '#866043');
            ctx.fillStyle = '#557a2b'; ctx.fillRect(64, 64, 64, 16);
        }

        try {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x13131a);

            camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(15, 20, 30);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);

            // تأمين جلب الـ Controls بغض النظر عن طريقة حقن المكتبة بالمتصفح
            const OrbitControlsClass = THREE.OrbitControls || window.OrbitControls;
            if (!OrbitControlsClass) {
                throw new Error("لم نتمكن من العثور على مكتبة التحكم بالكاميرا OrbitControls.");
            }
            controls = new OrbitControlsClass(camera, renderer.domElement);
            controls.enableDamping = true;

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const sunLight = new THREE.DirectionLight(0xffffff, 0.5);
            sunLight.position.set(10, 30, 15);
            scene.add(sunLight);

            initTextureAtlas();

            function animate() {
                requestAnimationFrame(animate);
                controls.update();
                renderer.render(scene, camera);
            }
            animate();

        } catch (e) {
            document.getElementById('error-log').style.display = 'block';
            document.getElementById('error-log').innerText += `\n[فشل في تهيئة 3D]: ${e.message}`;
        }

        function getUVBounds(type, faceId) {
            let texId = 2; // افتراضي حجر[cite: 3]
            if(type === 4) texId = 4;
            else if(type === 2) texId = 2;
            else if(type === 3) texId = 3;
            else if(type === 5) texId = 5;
            else if(type === 1) {
                texId = (faceId === 2) ? 1 : (faceId === 3 ? 4 : 6);[cite: 3]
            }
            let col = (texId >= 1 && texId <= 4) ? (texId - 1) : (texId - 5);
            let row = (texId >= 1 && texId <= 4) ? 0 : 1;
            return { uMin: col*0.25, vMin: 1.0-(row+1)*0.25, uMax: (col+1)*0.25, vMax: 1.0-row*0.25 };
        }

        // الدالة الرئيسية المستدعاة عند نجاح معالجة ملفك
        function renderWorldScene(blocks) {
            if (currentMesh) scene.remove(currentMesh);

            const blockMap = new Map();
            blocks.forEach(b => blockMap.set(`${b.x},${b.y},${b.z}`, b.type));

            const vertices = [], uvs = [], indices = [];
            let vOffset = 0;

            const faces = [
                { id: 0, dx: 0, dy: 0, dz: 1 },  // Front[cite: 3]
                { id: 1, dx: 0, dy: 0, dz: -1 }, // Back[cite: 3]
                { id: 2, dx: 0, dy: 1, dz: 0 },  // Top[cite: 3]
                { id: 3, dx: 0, dy: -1, dz: 0 }, // Bottom[cite: 3]
                { id: 4, dx: 1, dy: 0, dz: 0 },  // Right[cite: 3]
                { id: 5, dx: -1, dy: 0, dz: 0 }  // Left[cite: 3]
            ];

            blocks.forEach(b => {
                if (b.type === 0) return; // Air[cite: 3]

                faces.forEach(f => {
                    const neighbor = blockMap.get(`${b.x+f.dx},${b.y+f.dy},${b.z+f.dz}`);
                    if (!neighbor || neighbor === 0) { // Hidden Face Culling[cite: 3]
                        const uv = getUVBounds(b.type, f.id);
                        let v = [];

                        if (f.id === 0) v = [b.x, b.y, b.z+1, b.x+1, b.y, b.z+1, b.x+1, b.y+1, b.z+1, b.x, b.y+1, b.z+1];
                        else if (f.id === 1) v = [b.x, b.y, b.z, b.x, b.y+1, b.z, b.x+1, b.y+1, b.z, b.x+1, b.y, b.z];
                        else if (f.id === 2) v = [b.x, b.y+1, b.z, b.x, b.y+1, b.z+1, b.x+1, b.y+1, b.z+1, b.x+1, b.y+1, b.z];
                        else if (f.id === 3) v = [b.x, b.y, b.z, b.x+1, b.y, b.z, b.x+1, b.y, b.z+1, b.x, b.y, b.z+1];
                        else if (f.id === 4) v = [b.x+1, b.y, b.z, b.x+1, b.y+1, b.z, b.x+1, b.y+1, b.z+1, b.x+1, b.y, b.z+1];
                        else if (f.id === 5) v = [b.x, b.y, b.z, b.x, b.y, b.z+1, b.x, b.y+1, b.z+1, b.x, b.y+1, b.z];

                        vertices.push(...v);
                        uvs.push(uv.uMin, uv.vMin, uv.uMax, uv.vMin, uv.uMax, uv.vMax, uv.uMin, uv.vMax);
                        indices.push(vOffset, vOffset+1, vOffset+2, vOffset, vOffset+2, vOffset+3);
                        vOffset += 4;
                    }
                });
            });

            if(vertices.length === 0) {
                alert("الملف تم قراءته بنجاح لكنه لا يحتوي على أي بلكات صلبة لعرضها (قد يحتوي عى هواء فقط)!");
                return;
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            geometry.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
            geometry.setIndex(indices);
            geometry.computeVertexNormals();

            const tex = new THREE.CanvasTexture(atlasCanvas);
            tex.magFilter = THREE.NearestFilter; tex.minFilter = THREE.NearestFilter;[cite: 3]
            const mat = new THREE.MeshStandardMaterial({ map: tex, roughness: 0.5 });

            currentMesh = new THREE.Mesh(geometry, mat);
            scene.add(currentMesh);

            geometry.computeBoundingSphere();
            controls.target.copy(geometry.boundingSphere.center);
            camera.position.set(geometry.boundingSphere.center.x + 10, geometry.boundingSphere.center.y + 15, geometry.boundingSphere.center.z + 20);
            controls.update();

            globalGeometryData = { vertices, uvs };
            document.getElementById('export-btn').style.display = 'block';
            statusVal.innerText = "تم عرض المجسم بنجاح!";
        }

        // معالجة تصدير الملف المضغوط
        document.getElementById('export-btn').addEventListener('click', function() {
            if (!globalGeometryData) return;
            const zip = new JSZip();
            const { vertices, uvs } = globalGeometryData;

            let obj = "# World Export\nmtllib world.mtl\no WorldMesh\nusemtl WorldMaterial\n\n";
            for (let i = 0; i < vertices.length; i += 3) obj += `v ${vertices[i]} ${vertices[i+1]} ${vertices[i+2]}\n`;
            for (let i = 0; i < uvs.length; i += 2) obj += `vt ${uvs[i]} ${uvs[i+1]}\n`;
            
            let vIdx = 1;
            for (let i = 0; i < vertices.length; i += 12) {
                obj += `f ${vIdx}/${vIdx} ${vIdx+1}/${vIdx+1} ${vIdx+2}/${vIdx+2} ${vIdx+3}/${vIdx+3}\n`;
                vIdx += 4;
            }

            zip.file("world.obj", obj);
            zip.file("world.mtl", `newmtl WorldMaterial\nKa 1.0 1.0 1.0\nKd 1.0 1.0 1.0\nmap_Kd texture.png\n`);

            atlasCanvas.toBlob(function(blob) {
                zip.file("texture.png", blob);
                zip.generateAsync({ type: "blob" }).then(content => {
                    const a = document.createElement("a");
                    a.href = URL.createObjectURL(content);
                    a.download = "world3d_model.zip";
                    a.click();
                });
            }, "image/png");
        });
    </script>
</body>
</html>
